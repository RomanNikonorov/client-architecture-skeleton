syntax = "proto3";

package creditexternalsystems;

option java_multiple_files = true;
option java_package = "me.nikonorov.credit.infrastructure.grpc.generated";
option java_outer_classname = "CreditExternalSystemsProto";

service CreditScoring {
  rpc Assess (CreditScoringRequest) returns (CreditScoringResponse);
}

message CreditScoringRequest {
  string request_id = 1;
  string client_id = 2;
  int32 requested_amount = 3;
}

message CreditScoringResponse {
  string status = 1;
  int32 score = 2;
  int32 recommended_limit = 3;
}

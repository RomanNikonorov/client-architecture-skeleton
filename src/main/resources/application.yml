spring:
  application:
    name: client-architecture-skeleton
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:h2:mem:clients;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  sql:
    init:
      mode: always
  grpc:
    client:
      channels:
        system-a:
          address: localhost:9091
          ssl:
            enabled: false
        system-b:
          address: localhost:9092
          ssl:
            enabled: false
        credit-scoring:
          address: localhost:9093
          ssl:
            enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  observations:
    key-values:
      application: ${spring.application.name}

app:
  async:
    # Ограничение fan-out внутри одного запроса, не глобальный bulkhead.
    max-parallel-tasks-per-request: 3
  client:
    external-systems:
      system-a:
        channel: system-a
        deadline: 300ms
        critical: true
        circuit-breaker-enabled: false
      system-b:
        channel: system-b
        deadline: 500ms
        critical: false
        circuit-breaker-enabled: true
    external-rest-systems:
      system-c:
        base-url: http://localhost:9083
        connect-timeout: 300ms
        read-timeout: 500ms
        critical: false
  credit:
    external-systems:
      scoring:
        channel: credit-scoring
        deadline: 400ms
        critical: false
    external-rest-systems:
      pricing:
        base-url: http://localhost:9084
        connect-timeout: 300ms
        read-timeout: 500ms
        critical: false

resilience4j:
  circuitbreaker:
    instances:
      external-system-b:
        sliding-window-type: count_based
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
